<!DOCTYPE html>
<html lang="zh">
<head>
  <link rel="alternate" hreflang="en" href="https://dendim0n.github.io/en/" />
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dendim0n</title>
  <meta name="description" content="开发者、研究者、建造者。">
  <link rel="canonical" href="https://dendim0n.github.io/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f6;
      --text: #1a1a1a;
      --text-muted: #888888;
      --accent: #c41e3a;
      --border: #e8e6e1;
      --card-bg: #ffffff;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* === Grid Pattern Background === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }

    /* === Navigation === */
    nav {
      position: relative;
      z-index: 1;
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-name {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    .nav-links a {
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* === Hero === */
    .hero {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 3rem 4rem;
      max-width: 960px;
    }
    .hero-greeting {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }
    .hero-title span {
      color: var(--text-muted);
      font-weight: 400;
    }
    .hero-desc {
      margin-top: 1.5rem;
      font-size: 1.0625rem;
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 48ch;
    }

    /* === Cards === */
    .cards {
      position: relative;
      z-index: 1;
      padding: 0 3rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1px;
      max-width: 960px;
      background: var(--border);
      border: 1px solid var(--border);
      margin: 0 3rem;
    }
    .card {
      background: var(--card-bg);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.2s;
    }
    .card:hover { background: #fdfcfa; }
    .card-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .card-title a {
      color: var(--text);
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent); }
    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* === Footer === */
    footer {
      position: relative;
      z-index: 1;
      padding: 2rem 3rem;
      font-size: 0.75rem;
      opacity: 0;
      color: var(--text-muted);
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      display: flex;
      justify-content: space-between;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--accent); }

    /* === Responsive === */
    /* === Page Load Animations === */
    .hero-greeting,
    .hero-title,
    .hero-desc {
      opacity: 0;
      transform: translateY(16px);
      animation: fade-slide-in 0.4s ease-out forwards;
    }
    .hero-title { animation-delay: 0.1s; }
    .hero-desc { animation-delay: 0.2s; }

    .card {
      opacity: 0;
      transform: translateY(12px);
      animation: fade-slide-in 0.3s ease-out forwards;
    }
    .card:nth-child(1) { animation-delay: 0.25s; }
    .card:nth-child(2) { animation-delay: 0.3s; }
    .card:nth-child(3) { animation-delay: 0.35s; }

    footer {
      opacity: 0;
      animation: fade-in 0.3s ease-out 0.4s forwards;
    }

    @keyframes fade-slide-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      .hero { padding: 0 1.5rem 3rem; }
      .cards { margin: 0 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; }
    }
    @media (max-width: 480px) {
      nav { padding: 1rem; }
      .hero { padding: 0 1rem 2rem; }
      .cards { margin: 0 1rem; }
      footer { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-name">Dendim0n</div>
  <div class="nav-links">
    <a href="https://github.com/Dendim0n" target="_blank">GitHub</a>
    <a href="https://dendim0n.github.io/stocklaw-research/">投研</a>
    <a href="/en/" lang="en">English</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-greeting">HELLO</div>
  <h1 class="hero-title">
    我喜欢创造<br>
    <span>实用的项目。</span>
  </h1>
  <p class="hero-desc">
    开发者和研究者。喜欢干净的代码、数据驱动的分析和时刻在线的系统。
  </p>
</section>

<div class="cards">
  <div class="card">
    <div class="card-label">项目</div>
    <h2 class="card-title"><a href="https://dendim0n.github.io/stocklaw-research/">StocKlaw 投研</a></h2>
    <p class="card-desc">数据驱动的美股分析。Hacker News/GitHub 信号扫描、组合分析、投资评论。双语（中/英）。</p>
  </div>
  <div class="card">
    <div class="card-label">技术栈</div>
    <h2 class="card-title">Python 量化</h2>
    <p class="card-desc">moomoo API, yfinance, FRED, SEC EDGAR。自动化筛选管线与因子研究。</p>
  </div>
  <div class="card">
    <div class="card-label">基础设施</div>
    <h2 class="card-title">自建部署</h2>
    <p class="card-desc">全跑在家用服务器上——自己的栈自己管。</p>
  </div>
</div>

<footer>
  <span>&copy; 2026 Dendim0n</span>
  <span>用❤搭建。</span>
</footer>

</body>
</html>
